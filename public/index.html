<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2d3149;
      --text: #e2e4f0;
      --muted: #6b7280;
      --accent: #6366f1;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .header h1 span { color: var(--accent); }
    .header-spacer { flex: 1; }
    .header-stats { font-size: 12px; color: var(--muted); display: flex; gap: 16px; }
    .header-stats strong { color: var(--text); }

    /* Toolbar */
    .toolbar {
      padding: 16px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: var(--surface2); border-color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn.primary:hover { background: #4f46e5; }
    .btn.danger { border-color: var(--red); color: var(--red); }
    .btn.danger:hover { background: rgba(239,68,68,0.1); }

    .search {
      padding: 7px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      width: 200px;
      outline: none;
    }
    .search:focus { border-color: var(--accent); }
    .search::placeholder { color: var(--muted); }

    /* Filter tabs */
    .filter-tabs { display: flex; gap: 4px; }
    .filter-tab {
      padding: 5px 12px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .filter-tab:hover, .filter-tab.active {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--accent);
    }

    /* Group sidebar + content layout */
    .layout {
      display: flex;
      padding: 0 24px 24px;
      gap: 16px;
      align-items: flex-start;
    }

    /* Group sidebar */
    .sidebar {
      width: 180px;
      flex-shrink: 0;
      position: sticky;
      top: 72px;
    }
    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 0 8px 8px;
    }
    .group-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      transition: all 0.1s;
      gap: 6px;
    }
    .group-item:hover { background: var(--surface); color: var(--text); }
    .group-item.active { background: var(--surface2); color: var(--text); border-left: 2px solid var(--accent); }
    .group-item-inner { flex: 1; overflow: hidden; }
    .group-item-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-item-path { font-size: 10px; color: var(--muted); opacity: 0.6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
    .group-count {
      font-size: 10px;
      background: var(--surface2);
      color: var(--muted);
      padding: 1px 6px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .group-item.active .group-count { background: var(--accent-dim); color: white; }

    /* Main table area */
    .main { flex: 1; overflow-x: auto; min-width: 0; }

    /* Table — single table for all groups so columns always align */
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 500px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    thead th {
      padding: 9px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    thead th.tool-col { text-align: center; width: 120px; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover:not(.group-row) { background: var(--surface); }
    tbody td { padding: 10px 12px; vertical-align: middle; }

    /* Group header row inside the single table */
    .group-row td {
      padding: 8px 12px;
      background: var(--surface);
      border-top: 2px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .group-row:first-child td { border-top: none; }
    .group-row:hover td { background: var(--surface2); }
    .group-row-inner {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .group-row-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .group-header-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
    }
    .badge-standalone { background: rgba(99,102,241,0.15); color: var(--accent); border: 1px solid rgba(99,102,241,0.3); }
    .badge-collection { background: rgba(245,158,11,0.12); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
    .group-toggle { color: var(--muted); font-size: 11px; margin-left: auto; transition: transform 0.2s; display: inline-block; }
    .group-toggle.collapsed { transform: rotate(-90deg); }

    .skill-row td { border-left: none; }
    .skill-row td:nth-child(2) { padding-left: 20px; }
    .skill-row:hover td { background: var(--surface); }

    .skill-name { font-weight: 400; color: var(--text); font-size: 12px; }
    .skill-desc {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    .tool-cell { text-align: center; }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .status-badge:hover { transform: scale(1.05); }
    .status-badge.linked { background: rgba(16,185,129,0.12); color: var(--green); border-color: rgba(16,185,129,0.3); }
    .status-badge.linked:hover { background: rgba(239,68,68,0.12); color: var(--red); border-color: rgba(239,68,68,0.3); }
    .status-badge.missing { background: rgba(107,114,128,0.1); color: var(--muted); border-color: var(--border); }
    .status-badge.missing:hover { background: rgba(99,102,241,0.12); color: var(--accent); border-color: rgba(99,102,241,0.3); }
    .status-badge.directory { background: rgba(245,158,11,0.1); color: var(--yellow); border-color: rgba(245,158,11,0.3); cursor: default; }
    .status-badge.directory:hover { transform: none; }
    .status-badge.wrong { background: rgba(239,68,68,0.1); color: var(--red); border-color: rgba(239,68,68,0.3); }
    .status-badge.blocked { background: rgba(107,114,128,0.08); color: #4b5563; border-color: #374151; cursor: pointer; }
    .status-badge.blocked:hover { background: rgba(99,102,241,0.08); color: #6b7280; border-color: rgba(99,102,241,0.3); }
    .status-badge.manual { background: rgba(245,158,11,0.08); color: #92400e; border-color: rgba(245,158,11,0.25); }
    .status-badge.manual:hover { background: rgba(99,102,241,0.12); color: var(--accent); border-color: rgba(99,102,241,0.3); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* Context menu */
    #ctx-menu {
      position: fixed; z-index: 500;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px; min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      display: none;
    }
    #ctx-menu.show { display: block; }
    .ctx-item {
      padding: 7px 12px; border-radius: 5px; cursor: pointer;
      font-size: 12px; color: var(--text); display: flex; align-items: center; gap: 8px;
    }
    .ctx-item:hover { background: var(--surface); }
    .ctx-item.danger { color: var(--red); }
    .ctx-item.danger:hover { background: rgba(239,68,68,0.1); }
    .ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 16px; border-radius: 8px;
      font-size: 13px; max-width: 320px; z-index: 999;
      opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok { border-color: var(--green); }
    #toast.err { border-color: var(--red); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      width: 640px; max-width: 90vw; max-height: 80vh; display: flex; flex-direction: column;
    }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 14px; font-weight: 600; }
    .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
    .log-output { font-family: monospace; font-size: 12px; line-height: 1.6; color: #a5b4fc; white-space: pre-wrap; word-break: break-all; }

    .conflict-badge { font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 6px; background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.3); font-weight: 600; cursor: help; }

    /* Batch toolbar */
    .batch-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
      background: var(--surface2); border-top: 1px solid var(--border);
      padding: 10px 24px; display: flex; gap: 8px; align-items: center;
      transform: translateY(100%); transition: transform 0.2s;
    }
    .batch-bar.show { transform: translateY(0); }
    .batch-count { font-size: 13px; color: var(--muted); margin-right: 4px; }
    .batch-label { font-size: 12px; color: var(--muted); margin: 0 4px; }

    /* Deleted modal list */
    .deleted-list { display: flex; flex-direction: column; gap: 8px; }
    .deleted-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface2); border-radius: 6px; border: 1px solid var(--border); }
    .deleted-item-name { font-size: 13px; font-weight: 500; }
    .deleted-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .empty { text-align: center; padding: 48px; color: var(--muted); }
    .loading { text-align: center; padding: 48px; color: var(--muted); }

    /* Skill detail drawer */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .drawer-overlay.show { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top: 0; right: -500px; width: 480px; max-width: 90vw; height: 100vh;
      background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 301; transition: right 0.25s ease; overflow: hidden;
    }
    .drawer.show { right: 0; }
    .drawer-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-shrink: 0;
    }
    .drawer-title { font-size: 15px; font-weight: 600; }
    .drawer-meta { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 380px; }
    .drawer-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
    .drawer-body h1 { font-size: 16px; font-weight: 600; margin: 0 0 12px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .drawer-body h2 { font-size: 14px; font-weight: 600; margin: 16px 0 8px; }
    .drawer-body h3 { font-size: 13px; font-weight: 600; margin: 12px 0 6px; color: var(--muted); }
    .drawer-body pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin: 8px 0; overflow-x: auto; }
    .drawer-body pre code { background: none; padding: 0; font-size: 11px; font-family: monospace; white-space: pre-wrap; word-break: break-all; color: #a5b4fc; }
    .drawer-body code { background: var(--surface2); padding: 1px 5px; border-radius: 3px; font-size: 11px; font-family: monospace; }
    .drawer-body p { font-size: 13px; line-height: 1.6; margin: 0 0 8px; }
    .drawer-body ul, .drawer-body ol { padding-left: 20px; margin: 0 0 8px; }
    .drawer-body li { font-size: 13px; line-height: 1.6; }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <h1>⚡ <span>Skill</span> Manager</h1>
  <div class="header-spacer"></div>
  <div class="header-stats" id="stats"></div>
</div>

<div class="toolbar">
  <input class="search" type="text" id="search" placeholder="搜索 skill..." oninput="render()">
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all', this)">全部</button>
    <button class="filter-tab" onclick="setFilter('linked', this)">已全链接</button>
    <button class="filter-tab" onclick="setFilter('partial', this)">部分链接</button>
    <button class="filter-tab" onclick="setFilter('unlinked', this)">全部缺失</button>
  </div>
  <div style="flex:1"></div>
  <button class="btn primary" onclick="syncAll()"><span class="spinner" id="sync-spinner" style="display:none"></span>⟳ 全量同步</button>
  <button class="btn danger" onclick="cleanLinks()">🧹 清理失效</button>
  <button class="btn" id="deleted-btn" onclick="showDeletedModal()" style="display:none">🗑 已删除 (<span id="deleted-count">0</span>)</button>
</div>

<div class="batch-bar" id="batch-bar">
  <span class="batch-count" id="batch-count">0 已选</span>
  <span class="batch-label">链接到:</span>
  <span id="batch-link-btns"></span>
  <span class="batch-label" style="margin-left:8px">断开:</span>
  <span id="batch-unlink-btns"></span>
  <div style="flex:1"></div>
  <button class="btn" onclick="clearSelection()">取消选择</button>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="content"><div class="loading"><span class="spinner"></span>加载中...</div></div>
</div>

<div id="toast"></div>
<div id="ctx-menu"></div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">操作日志</h3>
      <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('show')">✕</button>
    </div>
    <div class="modal-body"><pre class="log-output" id="modal-log"></pre></div>
  </div>
</div>

<div class="modal-overlay" id="deleted-overlay" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="modal-header">
      <h3>🗑 已删除的 Skill</h3>
      <button class="modal-close" onclick="document.getElementById('deleted-overlay').classList.remove('show')">✕</button>
    </div>
    <div class="modal-body" id="deleted-body"></div>
  </div>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="skill-drawer">
  <div class="drawer-header">
    <div style="min-width:0;flex:1">
      <div class="drawer-title" id="drawer-title"></div>
      <div class="drawer-meta" id="drawer-meta"></div>
    </div>
    <button class="modal-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
let skills = []
let tools = []
let rules = {}
let groupRules = {}
let toolRules = {}
let nameConflicts = {}
let filter = 'all'
let activeGroup = null
let collapsed = {}
let selectedSkills = new Set()
let toastTimer = null
let ctxMenu = null
let renderedGroups = new Map()
let currentList = []

async function load() {
  try {
    const [skillsRes, deletedRes] = await Promise.all([
      fetch('/api/skills'),
      fetch('/api/deleted-skills'),
    ])
    const data = await skillsRes.json()
    const deletedData = await deletedRes.json()
    skills = data.skills
    tools = data.tools
    rules = data.rules || {}
    groupRules = data.groupRules || {}
    toolRules = data.toolRules || {}
    nameConflicts = data.nameConflicts || {}
    const deletedCount = deletedData.deletedSkills?.length || 0
    const deletedBtn = document.getElementById('deleted-btn')
    deletedBtn.style.display = deletedCount > 0 ? '' : 'none'
    document.getElementById('deleted-count').textContent = deletedCount
    updateStats()
    render()
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty">加载失败: ${e.message}</div>`
  }
}

function updateStats() {
  const total = skills.length
  const groups = new Set(skills.map(s => s.group)).size
  const fullyLinked = skills.filter(s => tools.every(t => s.status[t] === 'linked')).length
  document.getElementById('stats').innerHTML =
    `<span>共 <strong>${total}</strong> 个 skill</span>` +
    `<span><strong>${groups}</strong> 个项目</span>` +
    `<span>完整链接 <strong>${fullyLinked}</strong></span>`
}

function setFilter(f, el) {
  filter = f
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'))
  el.classList.add('active')
  render()
}

function setActiveGroup(group) {
  activeGroup = group
  render()
}

// 按分组聚合 skills
function groupSkills(list) {
  const map = new Map()
  for (const s of list) {
    if (!map.has(s.group)) map.set(s.group, [])
    map.get(s.group).push(s)
  }
  return map
}

function render() {
  const q = document.getElementById('search').value.toLowerCase()

  let list = skills.filter(s => s.name.toLowerCase().includes(q) || s.group.toLowerCase().includes(q) || (s.description && s.description.toLowerCase().includes(q)))

  if (filter === 'linked') list = list.filter(s => tools.every(t => s.status[t] === 'linked'))
  else if (filter === 'partial') list = list.filter(s => tools.some(t => s.status[t] === 'linked') && !tools.every(t => s.status[t] === 'linked'))
  else if (filter === 'unlinked') list = list.filter(s => tools.every(t => s.status[t] !== 'linked'))

  if (activeGroup) list = list.filter(s => s.group === activeGroup)

  // 渲染侧边栏（始终基于全量数据，不受 activeGroup 过滤影响）
  renderSidebar(skills.filter(s => {
    if (!q) return true
    return s.name.toLowerCase().includes(q) || s.group.toLowerCase().includes(q)
  }))

  if (list.length === 0) {
    document.getElementById('content').innerHTML = `<div class="empty">没有匹配的 skill</div>`
    return
  }

  const grouped = groupSkills(list)
  renderedGroups = grouped
  currentList = list
  const toolHeaders = tools.map(t => {
    const isBlockedAll = toolRules[t]?.blockAll
    return `<th class="tool-col" oncontextmenu="showToolCtxMenu(event,'${t}')" style="cursor:pointer" title="右键管理 ${t} 全局规则">${isBlockedAll ? '🔒 ' : ''}${t}</th>`
  }).join('')
  const colspan = tools.length + 2  // +1 for checkbox column

  let tbody = ''
  for (const [group, groupSkills] of grouped) {
    const isCollapsed = activeGroup === group ? false : collapsed[group] !== false
    const standalone = groupSkills[0]?.standalone
    const badgeClass = standalone ? 'badge-standalone' : 'badge-collection'
    const badgeText = standalone ? '独立' : `${groupSkills.length} 个 skill`
    const allLinked = groupSkills.every(s => tools.every(t => s.status[t] === 'linked'))
    const anyMissing = groupSkills.some(s => tools.some(t => s.status[t] === 'missing'))
    const groupAllSelected = groupSkills.length > 0 && groupSkills.every(s => selectedSkills.has(s.name))

    // 分组标题行
    tbody += `<tr class="group-row" oncontextmenu="showGroupCtxMenu(event,'${esc(group)}')">
      <td style="width:28px;text-align:center;padding:0 4px" onclick="event.stopPropagation()">
        <input type="checkbox" data-group-cb="${esc(group)}" ${groupAllSelected ? 'checked' : ''}
          onchange="toggleSelectGroup('${esc(group)}',this.checked)" title="全选/取消此分组">
      </td>
      <td colspan="${colspan - 1}" onclick="toggleGroup('${esc(group)}')">
        <div class="group-row-inner">
          <span class="group-row-name">${esc(group)}</span>
          <span class="group-header-badge ${badgeClass}">${badgeText}</span>
          ${allLinked ? '<span style="font-size:11px;color:var(--green)">✓ 全部已链接</span>' : ''}
          ${anyMissing && !allLinked ? '<span style="font-size:11px;color:var(--muted)">部分未链接</span>' : ''}
          <span class="group-toggle ${isCollapsed ? 'collapsed' : ''}">▼</span>
        </div>
      </td>
    </tr>`

    if (!isCollapsed) {
      tbody += groupSkills.map(skill => {
        const statusCells = tools.map(tool => {
          const st = skill.status[tool]
          return `<td class="tool-cell"><span class="status-badge ${st}"
            onclick="toggleLink('${esc(skill.name)}','${esc(skill.group)}','${tool}','${st}')"
            oncontextmenu="showCtxMenu(event,'${esc(skill.name)}','${esc(skill.group)}','${tool}','${st}')"
            title="${esc(getTitle(st, skill.name, skill.group, tool))}">
            <span class="dot"></span>${getLabel(st, skill.name, skill.group, tool)}
          </span></td>`
        }).join('')
        const hasConflict = !!nameConflicts[skill.name]
        return `<tr class="skill-row">
          <td style="width:28px;text-align:center;padding:0 4px">
            <input type="checkbox" ${selectedSkills.has(skill.name) ? 'checked' : ''} onchange="toggleSelect('${esc(skill.name)}',this.checked)">
          </td>
          <td oncontextmenu="showSkillCtxMenu(event,'${esc(skill.name)}')">
            <div class="skill-name" onclick="showSkillDetail('${esc(skill.name)}')" style="cursor:pointer">${esc(skill.name)}${hasConflict ? `<span class="conflict-badge" title="名称冲突：存在于多个 skillsDir">⚠ 冲突</span>` : ''}</div>
            ${skill.description ? `<div class="skill-desc">${esc(skill.description)}</div>` : ''}
          </td>
          ${statusCells}
        </tr>`
      }).join('')
    }
  }

  document.getElementById('content').innerHTML = `
    <table>
      <thead><tr>
        <th style="width:28px"><input type="checkbox" title="全选/全不选" onchange="toggleSelectAll(this.checked)"></th>
        <th>Skill</th>${toolHeaders}
      </tr></thead>
      <tbody>${tbody}</tbody>
    </table>`
  // Sync indeterminate state on group checkboxes (can't be set via HTML attribute)
  document.querySelectorAll('input[data-group-cb]').forEach(cb => {
    const grp = cb.dataset.groupCb
    const gs = renderedGroups.get(grp) || []
    const any = gs.some(s => selectedSkills.has(s.name))
    const all = gs.length > 0 && gs.every(s => selectedSkills.has(s.name))
    cb.indeterminate = any && !all
  })
  updateBatchBar()
}

function renderSidebar(filteredSkills) {
  const grouped = groupSkills(filteredSkills)
  let html = `<div class="sidebar-title">项目分组</div>`
  html += `<div class="group-item ${!activeGroup ? 'active' : ''}" onclick="setActiveGroup(null)">
    <span class="group-item-name">全部</span>
    <span class="group-count">${filteredSkills.length}</span>
  </div>`
  for (const [group, gs] of grouped) {
    const groupPath = gs[0]?.path ? gs[0].path.substring(0, gs[0].path.lastIndexOf('/')).replace(/^\/home\/[^/]+/, '~') : ''
    html += `<div class="group-item ${activeGroup === group ? 'active' : ''}" onclick="setActiveGroup('${esc(group)}')">
      <div class="group-item-inner">
        <div class="group-item-name">${esc(group)}</div>
        ${groupPath ? `<div class="group-item-path" title="${esc(groupPath)}">${esc(groupPath)}</div>` : ''}
      </div>

}

function toggleGroup(group) {
  collapsed[group] = collapsed[group] === false ? true : false
  render()
}

// 返回屏蔽原因级别：'tool' | 'group' | 'skill'
function getBlockLevel(skillName, skillGroup, tool) {
  if (toolRules[tool]?.blockAll) return 'tool'
  const gr = groupRules[skillGroup]
  if (gr) {
    if (gr.exclude?.includes(tool)) return 'group'
    if (gr.only && !gr.only.includes(tool)) return 'group'
  }
  return 'skill'
}

// 判断 skill/组 是否在全局屏蔽的白名单中（例外）
function isToolAllowed(skillName, skillGroup, tool) {
  const tr = toolRules[tool]
  if (!tr?.blockAll) return false
  return tr.allow?.includes(skillName) || tr.allowGroups?.includes(skillGroup)
}

function getLabel(st, name, group, tool) {
  if (st !== 'blocked') return { linked: '已链接', missing: '未链接', manual: '手动断开', directory: '实体目录', wrong: '链接错误' }[st] || st
  const level = getBlockLevel(name, group, tool)
  if (level === 'tool') return '全局屏蔽'
  if (level === 'group') return '组屏蔽'
  return '已屏蔽'
}

function getTitle(st, name, group, tool) {
  if (st === 'blocked') {
    const level = getBlockLevel(name, group, tool)
    if (level === 'tool') return `${tool} 全局屏蔽中，点击为此 skill 开白名单 | 右键更多`
    if (level === 'group') return `项目组 [${group}] 屏蔽了 ${tool}，右键管理`
    return `已屏蔽：${name} 不允许链接到 ${tool}，点击解除`
  }
  const inAllowList = isToolAllowed(name, group, tool)
  if (inAllowList) {
    const suffix = ` | 🔓 白名单例外（${tool} 全局屏蔽中）`
    if (st === 'linked') return `点击移除链接 | 右键更多操作` + suffix
    if (st === 'missing') return `点击创建链接 | 右键更多操作` + suffix
  }
  if (st === 'linked') return `点击移除链接 | 右键更多操作`
  if (st === 'missing') return `点击创建链接 | 右键更多操作`
  if (st === 'manual') return `手动断开：同步时不会自动恢复 | 点击重新链接`
  if (st === 'directory') return '实体目录，需手动处理'
  if (st === 'wrong') return '软链接指向错误路径，点击修复'
  return ''
}

async function toggleLink(name, group, tool, status) {
  if (status === 'directory') return
  if (status === 'blocked') {
    const level = getBlockLevel(name, group, tool)
    if (level === 'tool') {
      if (!confirm(`为 "${name}" 开白名单：在 ${tool} 全局屏蔽中排除此 skill？`)) return
      await allowTool(tool, 'skill', name, true)
    } else if (level === 'group') {
      if (!confirm(`解除组屏蔽：允许项目组 "${group}" 链接到 ${tool}？`)) return
      await setGroupRule(group, tool, false)
    } else {
      if (!confirm(`解除屏蔽：允许 "${name}" 链接到 ${tool}？`)) return
      await setSkillRule(name, tool, false)
    }
    return
  }
  if (status === 'linked') {
    if (!confirm(`移除 ${tool} 中的 "${name}" 链接？`)) return
    const r = await fetch(`/api/skills/${name}/link`, {
      method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({tool})
    })
    const d = await r.json()
    toast(d.ok ? d.message : d.error, d.ok ? 'ok' : 'err')
  } else {
    const r = await fetch(`/api/skills/${name}/link`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({tool})
    })
    const d = await r.json()
    toast(d.ok ? d.message : d.error, d.ok ? 'ok' : 'err')
  }
  await load()
}

async function setSkillRule(name, tool, blocked) {
  const r = await fetch(`/api/skills/${name}/rule`, {
    method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({tool, blocked})
  })
  const d = await r.json()
  toast(d.ok ? (blocked ? `已屏蔽 ${name} → ${tool}` : `已解除屏蔽 ${name} → ${tool}`) : d.error, d.ok ? 'ok' : 'err')
  await load()
}
const setRule = setSkillRule  // 向后兼容

async function setGroupRule(group, tool, blocked) {
  const r = await fetch(`/api/groups/${encodeURIComponent(group)}/rule`, {
    method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({tool, blocked})
  })
  const d = await r.json()
  toast(d.ok ? (blocked ? `已屏蔽组 ${group} → ${tool}` : `已解除 ${group} 对 ${tool} 的屏蔽`) : d.error, d.ok ? 'ok' : 'err')
  await load()
}

async function allowTool(tool, type, name, allowed) {
  const r = await fetch(`/api/tools/${encodeURIComponent(tool)}/allow`, {
    method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({type, name, allowed})
  })
  const d = await r.json()
  const action = allowed ? `已开白名单` : `已移除白名单`
  toast(d.ok ? `${action}: ${name} → ${tool}` : d.error, d.ok ? 'ok' : 'err')
  await load()
}

async function setToolRule(tool, blockAll) {
  const r = await fetch(`/api/tools/${encodeURIComponent(tool)}/rule`, {
    method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({blockAll})
  })
  const d = await r.json()
  toast(d.ok ? (blockAll ? `已全局屏蔽 ${tool}` : `已解除 ${tool} 全局屏蔽`) : d.error, d.ok ? 'ok' : 'err')
  await load()
}

function showSkillCtxMenu(e, name) {
  e.preventDefault()
  e.stopPropagation()
  const menu = document.getElementById('ctx-menu')
  let html = `<div style="padding:6px 12px 4px;font-size:11px;color:var(--muted);font-weight:600">${esc(name)}</div>`
  html += `<div class="ctx-sep"></div>`
  html += `<div class="ctx-item danger" onclick="closeCtxMenu();confirmDeleteSkill('${esc(name)}')">🗑 删除 skill</div>`
  menu.innerHTML = html
  menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px'
  menu.style.top = Math.min(e.clientY, window.innerHeight - 100) + 'px'
  menu.classList.add('show')
}

function showCtxMenu(e, name, group, tool, status) {
  e.preventDefault()
  e.stopPropagation()
  const menu = document.getElementById('ctx-menu')
  const isBlocked = status === 'blocked'
  const isLinked = status === 'linked'
  let html = ''
  if (isBlocked) {
    const level = getBlockLevel(name, group, tool)
    if (level === 'tool') {
      html += `<div class="ctx-item" onclick="closeCtxMenu();allowTool('${tool}','skill','${esc(name)}',true)">🔓 为此 skill 开白名单</div>`
      html += `<div class="ctx-item" onclick="closeCtxMenu();allowTool('${tool}','group','${esc(group)}',true)">🔓 为整组 ${esc(group)} 开白名单</div>`
      html += `<div class="ctx-sep"></div>`
      html += `<div class="ctx-item" onclick="closeCtxMenu();setToolRule('${tool}',false)">🔓 解除 ${tool} 全局屏蔽</div>`
    } else if (level === 'group') {
      html += `<div class="ctx-item" onclick="closeCtxMenu();setGroupRule('${esc(group)}','${tool}',false)">🔓 解除组屏蔽（${esc(group)}）</div>`
      html += `<div class="ctx-sep"></div>`
      html += `<div class="ctx-item danger" onclick="closeCtxMenu();confirmBlockTool('${tool}')">🔒 全局屏蔽 ${tool}</div>`
    } else {
      html += `<div class="ctx-item" onclick="closeCtxMenu();setSkillRule('${esc(name)}','${tool}',false)">🔓 解除屏蔽</div>`
      html += `<div class="ctx-sep"></div>`
      html += `<div class="ctx-item" onclick="closeCtxMenu();confirmBlockGroup('${esc(group)}','${tool}')">🔒 屏蔽整组 ${esc(group)}</div>`
      html += `<div class="ctx-item danger" onclick="closeCtxMenu();confirmBlockTool('${tool}')">🔒 全局屏蔽 ${tool}</div>`
    }
  } else if (status === 'wrong') {
    html += `<div class="ctx-item" onclick="closeCtxMenu();fixLink('${esc(name)}','${tool}')">⟳ 修复软链接</div>`
    html += `<div class="ctx-sep"></div>`
    html += `<div class="ctx-item danger" onclick="closeCtxMenu();confirmBlock('${esc(name)}','${esc(group)}','${tool}')">🔒 屏蔽此 skill</div>`
  } else {
    if (isLinked) {
      html += `<div class="ctx-item" onclick="closeCtxMenu();toggleLink('${esc(name)}','${esc(group)}','${tool}','linked')">✕ 移除链接</div>`
      html += `<div class="ctx-sep"></div>`
    } else if (status === 'missing' || status === 'manual') {
      html += `<div class="ctx-item" onclick="closeCtxMenu();toggleLink('${esc(name)}','${esc(group)}','${tool}','${status}')">＋ 创建链接</div>`
      html += `<div class="ctx-sep"></div>`
    }
    html += `<div class="ctx-item danger" onclick="closeCtxMenu();confirmBlock('${esc(name)}','${esc(group)}','${tool}')">🔒 屏蔽此 skill</div>`
    html += `<div class="ctx-item danger" onclick="closeCtxMenu();confirmBlockGroup('${esc(group)}','${tool}')">🔒 屏蔽整组 ${esc(group)}</div>`
    html += `<div class="ctx-item danger" onclick="closeCtxMenu();confirmBlockTool('${tool}')">🔒 全局屏蔽 ${tool}</div>`
  }
  menu.innerHTML = html
  menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px'
  menu.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px'
  menu.classList.add('show')
}

function showGroupCtxMenu(e, group) {
  e.preventDefault()
  e.stopPropagation()
  const menu = document.getElementById('ctx-menu')
  let html = `<div style="padding:6px 12px 4px;font-size:11px;color:var(--muted);font-weight:600">项目组: ${esc(group)}</div>`
  html += `<div class="ctx-sep"></div>`
  for (const tool of tools) {
    const gr = groupRules[group]
    const isGroupBlocked = gr && (gr.exclude?.includes(tool) || (gr.only && !gr.only.includes(tool)))
    const isToolBlocked = toolRules[tool]?.blockAll
    const isGroupAllowed = toolRules[tool]?.allowGroups?.includes(group)

    if (isToolBlocked) {
      if (isGroupAllowed) {
        html += `<div class="ctx-item" onclick="closeCtxMenu();allowTool('${tool}','group','${esc(group)}',false)">🔒 移除白名单 → ${tool}</div>`
      } else {
        html += `<div class="ctx-item" onclick="closeCtxMenu();allowTool('${tool}','group','${esc(group)}',true)">🔓 开白名单 → ${tool}（全局屏蔽中）</div>`
      }
    } else if (isGroupBlocked) {
      html += `<div class="ctx-item" onclick="closeCtxMenu();setGroupRule('${esc(group)}','${tool}',false)">🔓 解除屏蔽 → ${tool}</div>`
    } else {
      html += `<div class="ctx-item danger" onclick="closeCtxMenu();confirmBlockGroup('${esc(group)}','${tool}')">🔒 屏蔽 → ${tool}</div>`
    }
  }
  html += `<div class="ctx-sep"></div>`
  html += `<div class="ctx-item danger" onclick="closeCtxMenu();confirmDeleteGroup('${esc(group)}')">🗑 删除整组</div>`
  menu.innerHTML = html
  menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px'
  menu.style.top = Math.min(e.clientY, window.innerHeight - 160) + 'px'
  menu.classList.add('show')
}

function showToolCtxMenu(e, tool) {
  e.preventDefault()
  e.stopPropagation()
  const menu = document.getElementById('ctx-menu')
  const tr = toolRules[tool]
  const isBlocked = tr?.blockAll
  const allowCount = (tr?.allow?.length || 0) + (tr?.allowGroups?.length || 0)
  let html = `<div style="padding:6px 12px 4px;font-size:11px;color:var(--muted);font-weight:600">Agent: ${esc(tool)}</div>`
  html += `<div class="ctx-sep"></div>`
  if (isBlocked) {
    if (allowCount > 0) {
      html += `<div style="padding:4px 12px;font-size:11px;color:var(--accent)">🔓 白名单例外: ${allowCount} 项</div>`
      html += `<div class="ctx-sep"></div>`
    }
    html += `<div class="ctx-item" onclick="closeCtxMenu();setToolRule('${tool}',false)">🔓 解除全局屏蔽</div>`
  } else {
    html += `<div class="ctx-item danger" onclick="closeCtxMenu();confirmBlockTool('${tool}')">🔒 全局屏蔽（禁止所有 skill）</div>`
  }
  menu.innerHTML = html
  menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px'
  menu.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px'
  menu.classList.add('show')
}

function closeCtxMenu() {
  document.getElementById('ctx-menu').classList.remove('show')
}

async function confirmBlock(name, group, tool) {
  if (!confirm(`屏蔽：禁止 "${name}" 链接到 ${tool}？\n（已有链接将自动移除）`)) return
  await setSkillRule(name, tool, true)
}

async function confirmBlockGroup(group, tool) {
  const count = skills.filter(s => s.group === group).length
  if (!confirm(`屏蔽整组：禁止 "${group}" 组的所有 ${count} 个 skill 链接到 ${tool}？\n（已有链接将自动移除）`)) return
  await setGroupRule(group, tool, true)
}

async function confirmBlockTool(tool) {
  const linked = skills.filter(s => s.status[tool] === 'linked').length
  if (!confirm(`全局屏蔽：禁止 ${tool} 链接所有 skill？\n（将自动移除 ${linked} 个已有链接）`)) return
  await setToolRule(tool, true)
}

async function showDeletedModal() {
  const r = await fetch('/api/deleted-skills')
  const d = await r.json()
  const list = d.deletedSkills || []
  const body = document.getElementById('deleted-body')
  if (list.length === 0) {
    body.innerHTML = '<div class="empty">没有已删除的 skill</div>'
  } else {
    body.innerHTML = `<div class="deleted-list">${list.map(({ name, existsOnDisk }) => `
      <div class="deleted-item">
        <div>
          <div class="deleted-item-name">${esc(name)}</div>
          <div class="deleted-item-meta">${existsOnDisk ? '✓ 本地文件存在，可恢复' : '✗ 本地文件已删除'}</div>
        </div>
        ${existsOnDisk
          ? `<button class="btn" onclick="restoreSkill('${esc(name)}')">↩ 恢复</button>`
          : `<button class="btn danger" onclick="purgeDeletedSkill('${esc(name)}')">彻底清除</button>`}
      </div>`).join('')}</div>`
  }
  document.getElementById('deleted-overlay').classList.add('show')
}

async function restoreSkill(name) {
  const r = await fetch(`/api/skills/${encodeURIComponent(name)}/restore`, { method: 'POST' })
  const d = await r.json()
  toast(d.ok ? `已恢复 "${name}"` : (d.error || '恢复失败'), d.ok ? 'ok' : 'err')
  await load()
  showDeletedModal()
}

async function purgeDeletedSkill(name) {
  if (!confirm(`彻底清除 "${name}"？\n此条目将从已删除列表中移除（本地文件已不存在）。`)) return
  const r = await fetch(`/api/skills/${encodeURIComponent(name)}/restore`, { method: 'POST' })
  await r.json()
  await load()
  showDeletedModal()
}

// ── Batch operations ───────────────────────────────────────────────────────────

function toggleSelect(name, checked) {
  if (checked) selectedSkills.add(name)
  else selectedSkills.delete(name)
  updateBatchBar()
}

function toggleSelectAll(checked) {
  if (checked) currentList.forEach(s => selectedSkills.add(s.name))
  else selectedSkills.clear()
  render()
}

function toggleSelectGroup(group, checked) {
  const gs = renderedGroups.get(group) || []
  if (checked) gs.forEach(s => selectedSkills.add(s.name))
  else gs.forEach(s => selectedSkills.delete(s.name))
  render()
}

function clearSelection() {
  selectedSkills.clear()
  render()
}

function updateBatchBar() {
  const bar = document.getElementById('batch-bar')
  const count = selectedSkills.size
  document.getElementById('batch-count').textContent = `${count} 已选`
  if (count === 0) { bar.classList.remove('show'); return }
  bar.classList.add('show')
  document.getElementById('batch-link-btns').innerHTML = tools.map(t =>
    `<button class="btn" onclick="batchLink('${t}')">+ ${t}</button>`).join('')
  document.getElementById('batch-unlink-btns').innerHTML = tools.map(t =>
    `<button class="btn danger" onclick="batchUnlink('${t}')">- ${t}</button>`).join('')
}

async function batchLink(tool) {
  const items = [...selectedSkills].map(name => ({ name, tool }))
  const r = await fetch('/api/batch/link', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ items })
  })
  const d = await r.json()
  const ok = d.results?.filter(r => r.ok).length ?? 0
  toast(`已链接 ${ok}/${items.length} 个 skill 到 ${tool}`)
  selectedSkills.clear()
  await load()
}

async function batchUnlink(tool) {
  const items = [...selectedSkills].map(name => ({ name, tool }))
  const r = await fetch('/api/batch/unlink', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ items })
  })
  const d = await r.json()
  const ok = d.results?.filter(r => r.ok).length ?? 0
  toast(`已断开 ${ok}/${items.length} 个 skill 与 ${tool} 的链接`)
  selectedSkills.clear()
  await load()
}

async function confirmDeleteSkill(name) {
  if (!confirm(`删除 skill "${name}"？\n将移除所有软链接，skill 从列表中消失。`)) return
  await _doDelete(`/api/skills/${encodeURIComponent(name)}`, `"${name}"`)
}

async function confirmDeleteGroup(group) {
  const count = skills.filter(s => s.group === group).length
  if (!confirm(`删除整组 "${group}"？\n共 ${count} 个 skill，将全部移除软链接并从列表消失。`)) return
  await _doDelete(`/api/groups/${encodeURIComponent(group)}`, `"${group}" 组`, count)
}

async function _doDelete(url, label, count) {
  const r = await fetch(url, { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ hardDelete: false }) })
  const d = await r.json()
  if (!r.ok) { toast(d.error || '删除失败', 'err'); return }
  toast(`已删除 ${label}${count ? `（${count} 个 skill）` : ''}`)
  await load()
}

document.addEventListener('click', closeCtxMenu)
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeCtxMenu(); closeDrawer() } })

// ── Skill detail drawer ─────────────────────────────────────────────────────

async function showSkillDetail(name) {
  document.getElementById('drawer-title').textContent = name
  document.getElementById('drawer-meta').textContent = '加载中...'
  document.getElementById('drawer-body').innerHTML = '<div class="loading"><span class="spinner"></span>加载中...</div>'
  document.getElementById('drawer-overlay').classList.add('show')
  document.getElementById('skill-drawer').classList.add('show')
  try {
    const r = await fetch(`/api/skills/${encodeURIComponent(name)}/content`)
    const d = await r.json()
    if (!r.ok) { document.getElementById('drawer-body').innerHTML = `<p style="color:var(--red)">${esc(d.error)}</p>`; return }
    const skill = skills.find(s => s.name === name)
    document.getElementById('drawer-meta').textContent = skill?.path || ''
    document.getElementById('drawer-body').innerHTML = renderMarkdown(d.content)
  } catch (e) {
    document.getElementById('drawer-body').innerHTML = `<p style="color:var(--red)">加载失败: ${esc(e.message)}</p>`
  }
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('show')
  document.getElementById('skill-drawer').classList.remove('show')
}

function renderMarkdown(md) {
  const lines = md.split('\n')
  let html = '', inCode = false, codeLines = []
  for (const line of lines) {
    if (line.startsWith('```')) {
      if (inCode) { html += `<pre><code>${esc(codeLines.join('\n'))}</code></pre>`; inCode = false; codeLines = [] }
      else { inCode = true }
      continue
    }
    if (inCode) { codeLines.push(line); continue }
    const e = esc(line)
    if (line.startsWith('### '))     html += `<h3>${inlineMd(e.slice(4))}</h3>`
    else if (line.startsWith('## ')) html += `<h2>${inlineMd(e.slice(3))}</h2>`
    else if (line.startsWith('# '))  html += `<h1>${inlineMd(e.slice(2))}</h1>`
    else if (/^[*-] /.test(line))    html += `<li>${inlineMd(e.slice(2))}</li>`
    else if (line.trim())            html += `<p>${inlineMd(e)}</p>`
  }
  if (inCode) html += `<pre><code>${esc(codeLines.join('\n'))}</code></pre>`
  return html
}

function inlineMd(s) {
  return s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
}

async function syncAll() {
  const sp = document.getElementById('sync-spinner')
  sp.style.display = 'inline-block'
  try {
    const r = await fetch('/api/sync', {method:'POST'})
    const d = await r.json()
    showLog('全量同步结果', d.output || d.error)
    await load()
  } finally {
    sp.style.display = 'none'
  }
}

async function cleanLinks() {
  const r = await fetch('/api/clean', {method:'POST'})
  const d = await r.json()
  showLog('清理结果', d.output || d.error)
  await load()
}

function showLog(title, content) {
  document.getElementById('modal-title').textContent = title
  document.getElementById('modal-log').textContent = (content||'').replace(/\x1b\[[0-9;]*m/g,'')
  document.getElementById('modal-overlay').classList.add('show')
}
function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('show')
}
function toast(msg, type='ok') {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = `show ${type}`
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000)
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;')
}

load()
